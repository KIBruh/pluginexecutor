name: Build and push image

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate_ref:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.validate.outputs.should_run }}
    steps:
      - name: Validate ref
        id: validate
        run: |
          is_supported_tag() {
            [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]
          }

          if [ "${GITHUB_REF_TYPE}" = "tag" ] && ! is_supported_tag; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"

  test:
    needs: [validate_ref]
    if: needs.validate_ref.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run tests
        run: pytest

  build:
    needs: [validate_ref, test]
    if: needs.validate_ref.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Compute image tags
        id: tags
        run: |
          image="${REGISTRY}/${IMAGE_LOWER}"
          tags="${image}:${GITHUB_REF_NAME}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            highest_stable_tag="$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"

            if [ -n "${highest_stable_tag}" ] && [ "${GITHUB_REF_NAME}" = "${highest_stable_tag}" ]; then
              tags="${tags}"$'\n'"${image}:latest"
            fi
          fi

          {
            echo 'tags<<EOF'
            echo "${tags}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
